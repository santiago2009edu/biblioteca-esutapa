<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnovaBiblio | Gestión Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .video-container { position: relative; overflow: hidden; border-radius: 1rem; background: #000; }
        #camera-stream { transform: scaleX(1); width: 100%; height: auto; }
        .scanner-overlay {
            position: absolute; top: 10%; left: 10%; right: 10%; bottom: 10%;
            border: 2px solid rgba(255,255,255,0.5); border-radius: 1rem;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); pointer-events: none;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- NAV BAR -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-book-open"></i> InnovaBiblio
            </h1>
            <div class="flex gap-4">
                <button onclick="switchView('inventory')" class="hover:text-indigo-200"><i class="fas fa-list"></i></button>
                <button onclick="switchView('scanner')" class="hover:text-indigo-200"><i class="fas fa-camera"></i></button>
                <button onclick="switchView('settings')" class="hover:text-indigo-200"><i class="fas fa-cog"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl">

        <!-- VIEW: SCANNER -->
        <section id="view-scanner" class="view-section">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-2xl font-bold mb-4">Escanear Nuevo Libro</h2>
                <div class="video-container mb-4">
                    <video id="camera-stream" autoplay playsinline></video>
                    <div class="scanner-overlay"></div>
                </div>
                <div class="flex gap-2">
                    <button id="capture-btn" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-expand"></i> ANALIZAR PORTADA
                    </button>
                </div>
                <canvas id="snapshot-canvas" class="hidden"></canvas>
            </div>
        </section>

        <!-- VIEW: INVENTORY -->
        <section id="view-inventory" class="view-section hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Inventario Local</h2>
                <button onclick="exportData()" class="text-sm bg-green-100 text-green-700 px-3 py-1 rounded-full hover:bg-green-200">
                    <i class="fas fa-file-export"></i> Exportar JSON
                </button>
            </div>
            <div id="inventory-list" class="grid gap-4">
                <!-- Libros se cargarán aquí -->
            </div>
        </section>

        <!-- VIEW: SETTINGS -->
        <section id="view-settings" class="view-section hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-2xl font-bold mb-4">Configuración</h2>
                <label class="block text-sm font-medium mb-2">Google Gemini API Key:</label>
                <input type="password" id="api-key-input" class="w-full p-3 border rounded-xl mb-4" placeholder="AIzaSy...">
                <button onclick="saveSettings()" class="w-full bg-slate-800 text-white py-3 rounded-xl hover:bg-slate-900">Guardar Configuración</button>
                <p class="mt-4 text-xs text-slate-500">Tu clave se guarda localmente en el navegador.</p>
            </div>
        </section>

    </main>

    <!-- MODAL DE CONFIRMACIÓN -->
    <div id="modal-confirm" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4 border-b pb-2">Confirmar Metadatos</h3>
            <div id="ai-result-content" class="space-y-4">
                <!-- Formulario dinámico de la IA -->
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 py-3 border rounded-xl hover:bg-slate-50">Cancelar</button>
                <button onclick="commitToDB()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">Guardar en Biblioteca</button>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS (DEXIE) ---
        const db = new Dexie("InnovaBiblioDB");
        db.version(1).stores({
            books: "++id, codigo_item, titulo, autor, categoria, isbn, timestamp"
        });

        // --- ESTADO GLOBAL ---
        let stream = null;
        let lastAIResult = null;

        // --- NAVEGACIÓN ---
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            if(viewId === 'scanner') initCamera();
            if(viewId === 'inventory') renderInventory();
        }

        // --- CÁMARA ---
        async function initCamera() {
            try {
                if(stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } }, 
                    audio: false 
                });
                document.getElementById('camera-stream').srcObject = stream;
            } catch (err) {
                alert("Error al acceder a la cámara: " + err.message);
            }
        }

        // --- PROCESAMIENTO IA (GEMINI) ---
        async function processWithAI(base64Image) {
            const apiKey = localStorage.getItem('gemini_api_key');
            if(!apiKey) return alert("Por favor, configura tu API Key primero.");

            const prompt = `Analiza la portada de este libro. Extrae la información y responde ÚNICAMENTE con un objeto JSON plano sin formato markdown.
            Esquema: {
                "titulo": "Título corregido",
                "autor": "Autor(es)",
                "categoria": "Matemáticas|Tecnología|Literatura|Ciencias Naturales|Ciencias Sociales",
                "editorial": "Editorial o N/A",
                "ano_publicacion": YYYY,
                "isbn": "ISBN-13/10",
                "sinopsis": "Resumen de 2 líneas"
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const textResponse = data.candidates[0].content.parts[0].text;
                // Limpieza de posibles etiquetas markdown
                const cleanJson = textResponse.replace(/```json|```/g, "").trim();
                return JSON.parse(cleanJson);
            } catch (err) {
                console.error(err);
                alert("Error procesando con IA. Revisa tu API Key o conexión.");
            }
        }

        // --- LÓGICA DE CAPTURA ---
        document.getElementById('capture-btn').onclick = async () => {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('snapshot-canvas');
            const btn = document.getElementById('capture-btn');

            // Feedback visual
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESANDO...';

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.8);
            const result = await processWithAI(base64);

            if(result) {
                lastAIResult = {
                    ...result,
                    codigo_item: `${result.categoria.substring(0,3).toUpperCase()}-${Math.floor(Math.random()*1000)}`,
                    timestamp: Date.now()
                };
                showConfirmationModal(lastAIResult);
            }
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-expand"></i> ANALIZAR PORTADA';
        };

        // --- UI HELPERS ---
        function showConfirmationModal(data) {
            const container = document.getElementById('ai-result-content');
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label class="text-xs font-bold text-slate-500 uppercase">Título</label>
                        <input id="edit-titulo" class="w-full border-b p-1" value="${data.titulo}"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Autor</label>
                        <input id="edit-autor" class="w-full border-b p-1" value="${data.autor}"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">ISBN</label>
                        <input id="edit-isbn" class="w-full border-b p-1" value="${data.isbn}"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Categoría</label>
                        <select id="edit-categoria" class="w-full border-b p-1">
                            <option ${data.categoria=='Matemáticas'?'selected':''}>Matemáticas</option>
                            <option ${data.categoria=='Tecnología'?'selected':''}>Tecnología</option>
                            <option ${data.categoria=='Literatura'?'selected':''}>Literatura</option>
                            <option ${data.categoria=='Ciencias Naturales'?'selected':''}>Ciencias Naturales</option>
                            <option ${data.categoria=='Ciencias Sociales'?'selected':''}>Ciencias Sociales</option>
                        </select>
                    </div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Código</label>
                        <input id="edit-codigo" class="w-full border-b p-1" value="${data.codigo_item}"></div>
                </div>
            `;
            document.getElementById('modal-confirm').classList.remove('hidden');
        }

        async function commitToDB() {
            const updatedData = {
                ...lastAIResult,
                titulo: document.getElementById('edit-titulo').value,
                autor: document.getElementById('edit-autor').value,
                isbn: document.getElementById('edit-isbn').value,
                categoria: document.getElementById('edit-categoria').value,
                codigo_item: document.getElementById('edit-codigo').value
            };
            await db.books.add(updatedData);
            closeModal();
            switchView('inventory');
        }

        function closeModal() { document.getElementById('modal-confirm').classList.add('hidden'); }

        async function renderInventory() {
            const list = document.getElementById('inventory-list');
            const books = await db.books.reverse().toArray();
            
            if(books.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-400 font-medium italic underline underline-offset-8">No hay libros registrados aún.</div>`;
                return;
            }

            list.innerHTML = books.map(book => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4">
                    <div class="h-24 w-16 bg-indigo-100 rounded flex-shrink-0 flex items-center justify-center text-indigo-400">
                        <i class="fas fa-book text-3xl"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <span class="text-xs font-bold px-2 py-1 bg-slate-100 rounded text-slate-600">${book.codigo_item}</span>
                            <span class="text-xs text-slate-400">${new Date(book.timestamp).toLocaleDateString()}</span>
                        </div>
                        <h4 class="font-bold text-lg leading-tight mt-1">${book.titulo}</h4>
                        <p class="text-sm text-slate-600">${book.autor}</p>
                        <p class="text-xs text-indigo-600 font-semibold mt-2 underline">${book.categoria}</p>
                    </div>
                    <button onclick="deleteBook(${book.id})" class="text-slate-300 hover:text-red-500 self-start"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function deleteBook(id) {
            if(confirm("¿Eliminar este registro?")) {
                await db.books.delete(id);
                renderInventory();
            }
        }

        // --- SETTINGS & EXPORT ---
        function saveSettings() {
            const key = document.getElementById('api-key-input').value;
            localStorage.setItem('gemini_api_key', key);
            alert("Configuración guardada.");
        }

        async function exportData() {
            const allBooks = await db.books.toArray();
            const blob = new Blob([JSON.stringify(allBooks, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `inventario_innova_biblio_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // Iniciar
        document.getElementById('api-key-input').value = localStorage.getItem('gemini_api_key') || '';
        switchView('scanner');

    </script>
</body>
</html>
